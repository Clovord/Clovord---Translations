name: Sync Translations

on:
  push:
    branches: [main]

jobs:
  validate-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON files are non-empty and parseable
        run: |
          python scripts/validate_translations.py

  detect:
    needs: validate-json
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      webapp: ${{ steps.filter.outputs.webapp }}
      downloads: ${{ steps.filter.outputs.downloads }}
      desktop: ${{ steps.filter.outputs.desktop }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050
        id: filter
        with:
          filters: |
            api:
              - "API/**"
            webapp:
              - "WebApp/**"
            downloads:
              - "DownloadPage/**"
            desktop:
              - "DesktopApp/**"
              - "WebApp/**"
            mobile:
              - "MobileApp/**"
              - "WebApp/**"

  trigger-translation-webhook:
    needs: detect
    if: needs.detect.outputs.api == 'true' || needs.detect.outputs.webapp == 'true' || needs.detect.outputs.desktop == 'true' || needs.detect.outputs.mobile == 'true' || needs.detect.outputs.downloads == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Trigger translation webhook
        env:
          API_BASE_URL: ${{ secrets.ORG_API_BASE_URL }}
          BUILD_WEBHOOK_TOKEN: ${{ secrets.CLOVORD_BUILD_WEBHOOK_SECRET || secrets.ORG_API_BUILD_WEBHOOK_SECRET }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          python scripts/trigger_translation_webhook.py

  sync-api:
    needs: detect
    if: needs.detect.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync API translations
        env:
          TOKEN: ${{ secrets.SYNC_API_TOKEN }}
        run: |
          ROOT_DIR="$PWD"
          BRANCH="automation/sync-api-translations"
          BASE_BRANCH="main"
          REPO="Clovord/Clovord---API"

          if [ -z "$TOKEN" ]; then
            echo "SYNC_API_TOKEN is empty or not configured"
            exit 1
          fi

          git clone "https://x-access-token:${TOKEN}@github.com/${REPO}.git" target
          cd target

          git config user.email "bot@clovord.com"
          git config user.name "Clovord Bot"
          git fetch origin "${BRANCH}" || true

          if git show-ref --verify --quiet "refs/remotes/origin/${BRANCH}"; then
            git checkout -B "${BRANCH}" "origin/${BRANCH}"
          else
            git checkout -B "${BRANCH}" "origin/${BASE_BRANCH}"
          fi

          python "$ROOT_DIR/scripts/require_codeowners.py" --repo-dir "$PWD" --required-path "translations/"

          rm -rf translations
          mkdir -p translations
          cp -R "$ROOT_DIR"/API/* translations/

          git add -A translations
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Sync translations (API)"
          git push origin "${BRANCH}" --force-with-lease

          rebase_push_success=0
          for attempt in 1 2 3; do
            git fetch origin "${BASE_BRANCH}"
            if ! git rebase "origin/${BASE_BRANCH}"; then
              git rebase --abort || true
              if [ "$attempt" -lt 3 ]; then
                sleep $((attempt * 2))
                continue
              fi
              echo "Rebase failed after ${attempt} attempts"
              exit 1
            fi

            if git push origin "${BRANCH}" --force-with-lease; then
              rebase_push_success=1
              break
            fi

            if [ "$attempt" -lt 3 ]; then
              sleep $((attempt * 2))
            fi
          done

          if [ "$rebase_push_success" -ne 1 ]; then
            echo "Failed to push rebased branch after retries"
            exit 1
          fi

          export GH_TOKEN="$TOKEN"
          PR_NUMBER=$(gh pr list \
            --repo "$REPO" \
            --head "${BRANCH}" \
            --base "${BASE_BRANCH}" \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -z "${PR_NUMBER}" ]; then
            gh pr create \
              --repo "$REPO" \
              --base "${BASE_BRANCH}" \
              --head "${BRANCH}" \
              --title "Sync translations (API)" \
              --body "Automated translation sync from Clovord---Translations."

            PR_NUMBER=$(gh pr list \
              --repo "$REPO" \
              --head "${BRANCH}" \
              --base "${BASE_BRANCH}" \
              --state open \
              --json number \
              --jq '.[0].number')
          fi

          MERGE_OUTPUT=$(gh pr merge \
            --repo "$REPO" \
            --squash \
            --delete-branch \
            "${PR_NUMBER}" 2>&1) || MERGE_STATUS=$?

          if [ "${MERGE_STATUS:-0}" -ne 0 ]; then
            echo "${MERGE_OUTPUT}"
            exit "${MERGE_STATUS}"
          fi

  sync-webapp:
    needs: detect
    if: needs.detect.outputs.webapp == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync WebApp translations
        env:
          TOKEN: ${{ secrets.SYNC_WEBAPP_TOKEN }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          ROOT_DIR="$PWD"
          BRANCH="automation/sync-webapp-translations"
          BASE_BRANCH="master"
          REPO="Clovord/Clovord---Website---Main"

          if [ -z "$TOKEN" ]; then
            echo "SYNC_WEBAPP_TOKEN is empty or not configured"
            exit 1
          fi

          git clone "https://x-access-token:${TOKEN}@github.com/${REPO}.git" target
          cd target

          git config user.email "bot@clovord.com"
          git config user.name "Clovord Bot"
          git fetch origin "${BRANCH}" || true

          if git show-ref --verify --quiet "refs/remotes/origin/${BRANCH}"; then
            git checkout -B "${BRANCH}" "origin/${BRANCH}"
          else
            git checkout -B "${BRANCH}" "origin/${BASE_BRANCH}"
          fi

          python "$ROOT_DIR/scripts/require_codeowners.py" --repo-dir "$PWD" --required-path "dist/assets/translations/"

          if ! compgen -G "$ROOT_DIR/WebApp/*.json" > /dev/null; then
            echo "No source translation files found in $ROOT_DIR/WebApp"
            exit 1
          fi

          TMP_TRANSLATIONS_DIR=$(mktemp -d)
          cp -f "$ROOT_DIR"/WebApp/*.json "$TMP_TRANSLATIONS_DIR"/

          mkdir -p dist/assets/translations
          find dist/assets/translations -maxdepth 1 -type f -name "*.json" -delete
          cp -f "$TMP_TRANSLATIONS_DIR"/*.json dist/assets/translations/
          rm -rf "$TMP_TRANSLATIONS_DIR"

          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          source_sha = (os.environ.get("SOURCE_SHA") or "").strip()
          version = datetime.now(timezone.utc).strftime("%Y%m%d%H%M%S")
          payload = {
              "version": version,
              "source_commit": source_sha,
              "updated_at": datetime.now(timezone.utc).replace(microsecond=0).isoformat(),
          }
          out = Path("dist/assets/translations/manifest.json")
          out.write_text(json.dumps(payload, ensure_ascii=False, separators=(",", ":")), encoding="utf-8")
          print("Wrote", out)
          PY

          git add -A -f dist/assets/translations
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Sync translations (WebApp)"
          git push origin "${BRANCH}" --force-with-lease

          git fetch origin "${BASE_BRANCH}"
          git rebase "origin/${BASE_BRANCH}"
          git push origin "${BRANCH}" --force-with-lease

          export GH_TOKEN="$TOKEN"
          PR_NUMBER=$(gh pr list \
            --repo "$REPO" \
            --head "${BRANCH}" \
            --base "${BASE_BRANCH}" \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -z "${PR_NUMBER}" ]; then
            gh pr create \
              --repo "$REPO" \
              --base "${BASE_BRANCH}" \
              --head "${BRANCH}" \
              --title "Sync translations (WebApp)" \
              --body "Automated translation sync from Clovord---Translations."

            PR_NUMBER=$(gh pr list \
              --repo "$REPO" \
              --head "${BRANCH}" \
              --base "${BASE_BRANCH}" \
              --state open \
              --json number \
              --jq '.[0].number')
          fi

          MERGE_OUTPUT=$(gh pr merge \
            --repo "$REPO" \
            --squash \
            "${PR_NUMBER}" 2>&1) || MERGE_STATUS=$?

          if [ "${MERGE_STATUS:-0}" -ne 0 ]; then
            echo "${MERGE_OUTPUT}"
            exit "${MERGE_STATUS}"
          fi

  sync-downloads:
    needs: detect
    if: needs.detect.outputs.downloads == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync Downloads translations
        env:
          TOKEN: ${{ secrets.SYNC_DOWNLOADS_TOKEN }}
        run: |
          ROOT_DIR="$PWD"
          BRANCH="automation/sync-downloads-translations"
          BASE_BRANCH="master"
          REPO="Clovord/Clovord---Website---Downloads"

          if [ -z "$TOKEN" ]; then
            echo "SYNC_DOWNLOADS_TOKEN is empty or not configured"
            exit 1
          fi

          git clone "https://x-access-token:${TOKEN}@github.com/${REPO}.git" target
          cd target

          git config user.email "bot@clovord.com"
          git config user.name "Clovord Bot"
          git fetch origin "${BRANCH}" || true

          if git show-ref --verify --quiet "refs/remotes/origin/${BRANCH}"; then
            git checkout -B "${BRANCH}" "origin/${BRANCH}"
          else
            git checkout -B "${BRANCH}" "origin/${BASE_BRANCH}"
          fi

          python "$ROOT_DIR/scripts/require_codeowners.py" --repo-dir "$PWD" --required-path "assets/translations/"

          rm -rf assets/translations
          mkdir -p assets/translations
          cp -R "$ROOT_DIR"/DownloadPage/* assets/translations/

          git add -A assets/translations
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Sync translations (Downloads)"
          git push origin "${BRANCH}" --force-with-lease

          git fetch origin "${BASE_BRANCH}"
          git rebase "origin/${BASE_BRANCH}"
          git push origin "${BRANCH}" --force-with-lease

          export GH_TOKEN="$TOKEN"
          PR_NUMBER=$(gh pr list \
            --repo "$REPO" \
            --head "${BRANCH}" \
            --base "${BASE_BRANCH}" \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -z "${PR_NUMBER}" ]; then
            gh pr create \
              --repo "$REPO" \
              --base "${BASE_BRANCH}" \
              --head "${BRANCH}" \
              --title "Sync translations (Downloads)" \
              --body "Automated translation sync from Clovord---Translations."

            PR_NUMBER=$(gh pr list \
              --repo "$REPO" \
              --head "${BRANCH}" \
              --base "${BASE_BRANCH}" \
              --state open \
              --json number \
              --jq '.[0].number')
          fi

          MERGE_OUTPUT=$(gh pr merge \
            --repo "$REPO" \
            --squash \
            "${PR_NUMBER}" 2>&1) || MERGE_STATUS=$?

          if [ "${MERGE_STATUS:-0}" -ne 0 ]; then
            echo "${MERGE_OUTPUT}"
            exit "${MERGE_STATUS}"
          fi

  sync-desktop:
    needs: detect
    if: needs.detect.outputs.desktop == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync Desktop translations
        env:
          TOKEN: ${{ secrets.SYNC_DESKTOP_TOKEN }}
        run: |
          ROOT_DIR="$PWD"
          BRANCH="automation/sync-desktop-translations"
          BASE_BRANCH="master"
          REPO="Clovord/Clovord---Desktop"

          if [ -z "$TOKEN" ]; then
            echo "SYNC_DESKTOP_TOKEN is empty or not configured"
            exit 1
          fi

          git clone "https://x-access-token:${TOKEN}@github.com/${REPO}.git" target
          cd target

          git config user.email "bot@clovord.com"
          git config user.name "Clovord Bot"
          git fetch origin "${BRANCH}" || true

          if git show-ref --verify --quiet "refs/remotes/origin/${BRANCH}"; then
            git checkout -B "${BRANCH}" "origin/${BRANCH}"
          else
            git checkout -B "${BRANCH}" "origin/${BASE_BRANCH}"
          fi

          python "$ROOT_DIR/scripts/require_codeowners.py" --repo-dir "$PWD" --required-path "resources/overrides/translations/"

          rm -rf resources/overrides/translations
          mkdir -p resources/overrides/translations

          if [ -d "$ROOT_DIR/DesktopApp" ]; then
            cp -R "$ROOT_DIR"/DesktopApp/. resources/overrides/translations/
          fi
          if [ -d "$ROOT_DIR/WebApp" ]; then
            cp -R "$ROOT_DIR"/WebApp/. resources/overrides/translations/
          fi

          git add -A resources/overrides/translations
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Sync translations (Desktop)"
          git push origin "${BRANCH}" --force-with-lease

          git fetch origin "${BASE_BRANCH}"
          git rebase "origin/${BASE_BRANCH}"
          git push origin "${BRANCH}" --force-with-lease

          export GH_TOKEN="$TOKEN"
          PR_NUMBER=$(gh pr list \
            --repo "$REPO" \
            --head "${BRANCH}" \
            --base "${BASE_BRANCH}" \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -z "${PR_NUMBER}" ]; then
            gh pr create \
              --repo "$REPO" \
              --base "${BASE_BRANCH}" \
              --head "${BRANCH}" \
              --title "Sync translations (Desktop)" \
              --body "Automated translation sync from Clovord---Translations."

            PR_NUMBER=$(gh pr list \
              --repo "$REPO" \
              --head "${BRANCH}" \
              --base "${BASE_BRANCH}" \
              --state open \
              --json number \
              --jq '.[0].number')
          fi

          MERGE_OUTPUT=$(gh pr merge \
            --repo "$REPO" \
            --squash \
            "${PR_NUMBER}" 2>&1) || MERGE_STATUS=$?

          if [ "${MERGE_STATUS:-0}" -ne 0 ]; then
            echo "${MERGE_OUTPUT}"
            exit "${MERGE_STATUS}"
          fi

  sync-mobile:
    needs: detect
    if: needs.detect.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync Mobile translations
        env:
          TOKEN: ${{ secrets.SYNC_MOBILE_TOKEN }}
        run: |
          ROOT_DIR="$PWD"
          BRANCH="automation/sync-mobile-translations"
          BASE_BRANCH="master"
          REPO="Clovord/Clovord---Mobile"

          if [ -z "$TOKEN" ]; then
