              --base "${BASE_BRANCH}" \
              --head "${BRANCH}" \
              --title "Sync translations (Mobile)" \
              --body "Automated translation sync from Clovord---Translations."

            PR_NUMBER=$(gh pr list \
              --repo "$REPO" \
              --head "${BRANCH}" \
              --base "${BASE_BRANCH}" \
              --state open \
              --json number \
              --jq '.[0].number')
          fi

          MERGE_OUTPUT=$(gh pr merge \
            --repo "$REPO" \
