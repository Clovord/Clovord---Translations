          fi

          python "$ROOT_DIR/scripts/require_codeowners.py" --repo-dir "$PWD" --required-path "assets/translations/"

          rm -rf assets/translations
          mkdir -p assets/translations

          if [ -d "$ROOT_DIR/MobileApp" ]; then
            cp -R "$ROOT_DIR"/MobileApp/. assets/translations/
          fi
          if [ -d "$ROOT_DIR/WebApp" ]; then
            cp -R "$ROOT_DIR"/WebApp/. assets/translations/
          fi

          git add -A assets/translations
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Sync translations (Mobile)"
          git push origin "${BRANCH}" --force-with-lease

          git fetch origin "${BASE_BRANCH}"
          git rebase "origin/${BASE_BRANCH}"
          git push origin "${BRANCH}" --force-with-lease

          export GH_TOKEN="$TOKEN"
          PR_NUMBER=$(gh pr list \
            --repo "$REPO" \
            --head "${BRANCH}" \
            --base "${BASE_BRANCH}" \
            --state open \
